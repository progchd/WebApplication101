name: CI/CD Build & Deploy Container

on:
  push:
    branches:
      - main  # Runs automatically when you push to your main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Downloads your code inside the GitHub runner
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Logs into your Azure account using your secret token
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Logs into your private Docker container registry (ACR)
    - name: Log into Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    # 4. Compiles your project into a Docker image and pushes it to ACR
    # IMPORTANT: Change 'MyWebApiProject' to match your actual API folder name!
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/webapi:${{ github.sha }} -f ./WebApplication1/Dockerfile .
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/webapi:${{ github.sha }}

    # 5. Tells your Azure Web App to deploy the new container image
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'your-azure-web-app-name' # Replace with your exact Azure Web App Name
        images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/webapi:${{ github.sha }}'